<div class="poc-page dashboard">
  <h1 class="poc-section-title">Tableau de bord</h1>

  <app-welcome-banner></app-welcome-banner>

  <section class="dashboard__stats" aria-label="Indicateurs clés">
    <app-stat-card
      label="Utilisateurs actifs"
      [value]="(activeUsers$ | async) ?? '—'"
      icon="group"
      accent="primary"
      trend="up"
    ></app-stat-card>

    <app-stat-card
      label="Produits disponibles"
      [value]="(availableProducts$ | async) ?? '—'"
      icon="inventory_2"
      accent="success"
      trend="flat"
    ></app-stat-card>

    <app-stat-card
      label="Revenu cumulé (€)"
      [value]="(totalRevenue$ | async | number:'1.2-2') ?? '—'"
      icon="payments"
      accent="warn"
      trend="up"
    ></app-stat-card>
  </section>

  <!-- ** POC ** Statistiques avancées réintégrées via le custom element
       <mfe-stats> (mfe-stats Angular 18 encapsulé). Plus de
       componentFactory.create cross-version : le widget vit dans son
       propre platform A18 isolé. Le host gère les deux modes :
       - standalone (4200) : charge le bundle via la runtime Native
         Federation locale du legacy.
       - embarqué dans le shell : attend que le shell ait pré-enregistré
         <mfe-stats> via son APP_INITIALIZER. -->
  <section class="dashboard__mfe" aria-label="Statistiques avancées">
    <app-stats-element-host></app-stats-element-host>
  </section>
</div>
