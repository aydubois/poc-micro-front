<div class="poc-page dashboard">
  <h1 class="poc-section-title">Tableau de bord</h1>

  <app-welcome-banner></app-welcome-banner>

  <section class="dashboard__stats" aria-label="Indicateurs clés">
    <app-stat-card
      label="Utilisateurs actifs"
      [value]="(activeUsers$ | async) ?? '—'"
      icon="group"
      accent="primary"
      trend="up"
    ></app-stat-card>

    <app-stat-card
      label="Produits disponibles"
      [value]="(availableProducts$ | async) ?? '—'"
      icon="inventory_2"
      accent="success"
      trend="flat"
    ></app-stat-card>

    <app-stat-card
      label="Revenu cumulé (€)"
      [value]="(totalRevenue$ | async | number:'1.2-2') ?? '—'"
      icon="payments"
      accent="warn"
      trend="up"
    ></app-stat-card>
  </section>

  <!-- ** POC ** Emplacement micro-frontend Stats retiré : depuis la migration
       de mfe-stats vers Angular 18, le legacy Angular 16 ne peut plus
       l'héberger (cross-version sharing de @angular/core impossible). La
       feature est maintenant exposée directement par le shell moderne sur
       la route /stats. Voir README, section "Limites connues". -->
  <section class="dashboard__mfe-disabled" aria-label="Statistiques avancées (déplacé vers le shell)">
    <p class="dashboard__mfe-disabled-text">
      Les statistiques avancées sont désormais accessibles via la route
      <strong>/stats</strong> du shell moderne (widget mfe-stats-v21).
    </p>
  </section>
</div>
