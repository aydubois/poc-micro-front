<a *ngIf="!isEmbedded" class="poc-skip-link" href="#main-content">Aller au contenu principal</a>

<mat-toolbar *ngIf="!isEmbedded" color="primary" class="app-toolbar">
  <button
    mat-icon-button
    class="app-toolbar__menu-btn"
    type="button"
    aria-label="Ouvrir le menu de navigation"
    (click)="toggleSidenav()"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <span class="app-toolbar__title">{{ title }}</span>

  <span class="app-toolbar__spacer"></span>

  <button mat-icon-button type="button" aria-label="Menu utilisateur">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<div *ngIf="isEmbedded" class="embed-banner" role="note" aria-label="Indicateur d'encapsulation">
  <span class="embed-banner__dot" aria-hidden="true"></span>
  <span class="embed-banner__label">Legacy Angular 16 — encapsulé en Web Component dans le shell Angular 21</span>
  <span *ngIf="sharedUser" class="embed-banner__user">
    👋 {{ sharedUser.displayName }} <span class="embed-banner__via">via shared-bus</span>
  </span>
  <span class="embed-banner__tag">&lt;legacy-app&gt;</span>
</div>

<mat-sidenav-container class="app-shell" [class.is-embedded]="isEmbedded">
  <mat-sidenav
    *ngIf="!isEmbedded"
    #sidenav
    class="app-sidenav"
    [mode]="'side'"
    [opened]="true"
    role="navigation"
    aria-label="Navigation principale"
  >
    <mat-nav-list class="app-sidenav__list">
      <a
        *ngFor="let item of navItems; trackBy: trackByPath"
        mat-list-item
        [routerLink]="item.path"
        routerLinkActive="is-active"
        class="app-sidenav__link"
      >
        <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <main id="main-content" class="app-main" tabindex="-1">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
