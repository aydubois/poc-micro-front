<section class="stats-widget" aria-labelledby="stats-widget-title">
  <header class="stats-widget__header">
    <h3 id="stats-widget-title" class="stats-widget__title">📊 Statistiques v21 (micro-frontend)</h3>
    <span class="stats-widget__badge">mfe-stats-v21 · A21</span>
  </header>

  <ul class="stats-widget__list">
    @for (item of stats; track item.label) {
      <li class="stats-widget__item">
        <div class="stats-widget__icon" aria-hidden="true">{{ item.icon }}</div>
        <div class="stats-widget__body">
          <div class="stats-widget__label">{{ item.label }}</div>
          <div class="stats-widget__value">{{ item.value }}</div>
          <div class="stats-widget__delta">{{ item.delta }}</div>
        </div>
      </li>
    }
  </ul>
</section>
